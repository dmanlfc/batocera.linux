image boot.vfat {
	vfat {
		extraargs = "-F 32 -n BATOCERA"
		@files
	}
	size = 6G
}

image userdata.ext4 {
	ext4 {
		label = "SHARE"
		use-mke2fs = "true"
		extraargs = "-m 0"
	}
	size = "512M"
	mountpoint = "/userdata"
}

image batocera.img {
	hdimage {
		align = "1M"
	}

	partition u-boot-header {
		in-partition-table = "no"
		image = "../../uboot-odroid-go-ultra/u-boot-header.bin"
		offset = 0
		size = 440
	}

	partition u-boot-main {
		in-partition-table = "no"
		image = "../../uboot-odroid-go-ultra/u-boot-main.bin"
		offset = 512
	}

	partition vfat {
		partition-type = 0xC
		bootable = "true"
		image = "boot.vfat"
	}

	partition userdata {
		partition-type = 0x83
		image = "userdata.ext4"
	}
}
